name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "gradio_app.py"
      - "requirements.txt"
  workflow_dispatch:

jobs:
  sync-to-hf-space:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install huggingface_hub -q

      - name: Upload files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python .github/scripts/upload_to_hf.py
