name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - "gradio_app.py"
      - "requirements.txt"

jobs:
  sync-to-hf-space:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Upload gradio_app.py to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub -q
          python3 - <<EOF
import os
from huggingface_hub import HfApi

api = HfApi(token=os.environ["HF_TOKEN"])

for filename in ["gradio_app.py", "requirements.txt"]:
    api.upload_file(
        path_or_fileobj=filename,
        path_in_repo=filename,
        repo_id="ggapar/DFK1-Text-Classify",
        repo_type="space",
        commit_message=f"sync: {filename} from GitHub Actions",
    )
    print(f"✓ {filename} uploaded to HF Space")
EOF
